<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Cookie :3</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #3a6ea5 url('bliss.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Interactive Navigation Button */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .back-btn {
            display: inline-block;
            background: rgba(28, 34, 46, 0.8);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #94a1b2;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #252d3d;
            border-color: #ffffff;
            transform: scale(1.05) translateX(-4px);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        /* Profile Glass Panel with Reactive Hover Effect */
        .profile-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .profile-card:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-2px);
        }

        /* Spinny Interactive Avatar */
        .profile-avatar {
            width: 120px;
            height: 120px;
            object-fit: contain;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-card:hover .profile-avatar {
            transform: scale(1.08) rotate(7deg);
        }

        .profile-info h1 {
            font-size: 2.2rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            margin-bottom: 4px;
        }

        .profile-info .tag {
            display: inline-block;
            background: #1c222e;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            border: 1px solid #94a1b2;
            margin-bottom: 12px;
        }

        .profile-bio {
            font-size: 1.05rem;
            line-height: 1.5;
            max-width: 600px;
            color: #f0f0f0;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* Grid for Interactive Blocks */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* INTERACTIVE ACCORDION CARDS (Pure CSS using hidden radio buttons) */
        .tab-input {
            display: none;
        }

        .interactive-box {
            background: rgba(18, 26, 18, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
        }

        .interactive-box:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(24, 36, 24, 0.85);
            transform: scale(1.01);
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .box-header h2 {
            font-size: 1.25rem;
            color: #94a1b2;
            transition: color 0.2s ease;
        }

        .interactive-box:hover .box-header h2 {
            color: #ffffff;
        }

        /* Little status arrow switcher indicator */
        .arrow-indicator {
            font-size: 1.1rem;
            color: #94a1b2;
            transition: transform 0.3s ease;
        }

        /* Secret target drawer contents */
        .drawer-content {
            max-height: 0;
            opacity: 0;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            padding-top: 0;
        }

        .info-list {
            list-style: none;
            line-height: 1.8;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .info-list li {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 0;
        }

        .info-list li span.label {
            font-weight: bold;
            color: #ffffff;
        }

        .info-list li span.value {
            color: #b0bac7;
            font-family: monospace;
        }

        /* ----------------------------------------------------------------------- */
        /* INTERACTIVE LOGIC SWITCHERS (When checked, magically slide open!)        */
        /* ----------------------------------------------------------------------- */
        #tab1:checked + .interactive-box .drawer-content,
        #tab2:checked + .interactive-box .drawer-content {
            max-height: 250px; /* Expands open safely! */
            opacity: 1;
            padding-top: 14px;
        }

        #tab1:checked + .interactive-box .arrow-indicator,
        #tab2:checked + .interactive-box .arrow-indicator {
            transform: rotate(180deg);
            color: #ffffff;
        }

        #tab1:checked + .interactive-box,
        #tab2:checked + .interactive-box {
            border-color: #ffffff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .click-hint {
            font-size: 0.75rem;
            font-style: italic;
            color: #6a7685;
            text-align: center;
            margin-top: -4px;
            margin-bottom: 8px;
        }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
